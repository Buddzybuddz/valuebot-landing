<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #eee;}
  .headerInner {
    max-width: 1040px;
    margin: 0 auto;
    padding: 8px 18px;
    background: white;
  }

  /* Grid approach */
  .grid-header {
    display: grid;
    /* 8 nav items */
    grid-template-columns: repeat(8, max-content);
    column-gap: 16px;
    row-gap: 8px;
    justify-content: center;
  }

  .brand {
    /* Align left with item 1 ("C"), right with item 3 ("?") */
    grid-column: 1 / 4;
    /* The navlink has 8px 10px padding. The text is 10px inside. */
    margin-left: 10px;
    margin-right: 10px;

    display: flex;
    align-items: center;
  }

  .logo {
    display: flex;
    align-items: center;
    width: 100%;
    /* remove hardcoded height if possible, or keep max-height */
  }

  .brandLogo {
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  .ctaRowTop {
    /* Align right with item 8 ("FAQ") */
    /* Starting from column 4 (after item 3) to 9 (after item 8) */
    grid-column: 4 / 9;

    /* Align to right edge */
    justify-self: end;

    /* The navlink has 8px 10px padding. The text "FAQ" ends 10px from the right edge. */
    margin-right: 10px;

    display: flex;
    align-items: center;
    gap: 10px;
  }

  .navlink {
    color: #666;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-size: 14px;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
    text-decoration: none;
    white-space: nowrap;
  }

  .navCta {
    border: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.75);
    color: #1d1d1f;
    font-weight: 650;
    padding: 9px 14px;
    border-radius: 999px;
    text-decoration: none;
  }
  .navCta.primary {
    background: #0071e3;
    color: #fff;
  }

</style>
</head>
<body>
<header>
  <div class="headerInner">
    <div class="grid-header">
      <!-- Top row -->
      <div class="brand">
        <div class="logo">
          <img class="brandLogo" src="assets/valuebot.png" alt="ValueBot" />
        </div>
      </div>

      <div class="ctaRowTop">
        <a class="navCta primary">Recevoir l'email</a>
        <a class="navCta">Gérer mon abonnement</a>
      </div>

      <!-- Bottom row -->
      <a class="navlink" href="#cestquoi">C’est quoi ?</a>
      <a class="navlink" href="#casert">Ça sert à quoi ?</a>
      <a class="navlink" href="#comment">Comment ça marche ?</a>
      <a class="navlink" href="#pourqui">Pour qui ?</a>
      <a class="navlink" href="#je-recois">Je reçois quoi ?</a>
      <a class="navlink" href="#performances">Performances</a>
      <a class="navlink" href="#prix">Pour combien ?</a>
      <a class="navlink" href="#faq">FAQ</a>
    </div>
  </div>
</header>
</body>
</html>
