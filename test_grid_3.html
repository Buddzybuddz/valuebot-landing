<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #eee;}
  .headerInner {
    display: grid;
    /* We have 8 nav links, let's make them 8 columns */
    grid-template-columns: repeat(8, auto);
    column-gap: 16px;
    row-gap: 8px; /* space between top row and bottom row */
    justify-content: center; /* center the whole grid in the header */
    padding: 8px 18px;
    background: white;
  }

  .brand {
    /* "partie gauche du logo aligner avec le "C" de "C'est quoi ?" (item 1)
       partie droite du logo aligner avec le "?" de "Comment ca marche ?" (item 3) */
    grid-column: 1 / 4;

    /* Since navlink has padding: 8px 10px, the text starts 10px from the left
       and ends 10px from the right of the cell. */
    margin-left: 10px;
    margin-right: 10px;

    display: flex;
    align-items: center;
  }

  .logo {
    display: flex;
    align-items: center;
    width: 100%; /* Fill the container, which is exactly the width between 'C' and '?' */
    height: 70px; /* from original CSS */
    overflow: hidden; /* Or maybe not needed if image scales well */
  }

  /* From original CSS:
  .logo .brandLogo{
    height: 500px; margin-top: -50px;           /* grossit l’image hors du conteneur */
    margin-left: -100px;       /* recentrage */
    width: auto;
    display:block;
  }
  */

  /* NEW CSS for logo: */
  .brandLogo {
    width: 100%;
    height: auto;
    object-fit: contain; /* ensure it fits without distortion */
    /* Remove the negative margins and huge heights! */
  }

  .ctaRowTop {
    /* "partie droite du bouton "Gérer mon abonnement" soit aligner avec le "Q" de "FAQ" (item 8) */
    grid-column: 4 / 9; /* spanning the rest, up to item 8 */
    justify-self: end; /* align to the right of the container */

    /* FAQ navlink has padding 8px 10px, so text "Q" is near the right edge of cell.
       Wait, FAQ is "FAQ" so the "Q" is the last letter!
       The right padding is 10px, so we need margin-right: 10px on the button container
       to align the right edge of the button with the right edge of the text "FAQ". */
    margin-right: 10px;

    display: flex;
    align-items: center;
    gap: 10px;
  }

  .navlink {
    padding: 8px 10px;
    background: #f5f5f5;
    text-align: center;
    border-radius: 999px;
    white-space: nowrap; /* keep text from wrapping */
  }

  .navCta {
    padding: 9px 14px;
    border-radius: 999px;
    border: 1px solid #ccc;
    background: white;
  }
</style>
</head>
<body>
<header>
  <div class="headerInner">
    <!-- Top row items -->
    <div class="brand">
      <div class="logo">
        <img class="brandLogo" src="assets/Logo_v2.png" />
      </div>
    </div>

    <div class="ctaRowTop">
      <a class="navCta primary">Recevoir</a>
      <a class="navCta">Gérer mon abonnement</a>
    </div>

    <!-- Bottom row items (nav links) -->
    <a class="navlink" href="#cestquoi">C’est quoi ?</a>
    <a class="navlink" href="#casert">Ça sert à quoi ?</a>
    <a class="navlink" href="#comment">Comment ça marche ?</a>
    <a class="navlink" href="#pourqui">Pour qui ?</a>
    <a class="navlink" href="#je-recois">Je reçois quoi ?</a>
    <a class="navlink" href="#performances">Performances</a>
    <a class="navlink" href="#prix">Pour combien ?</a>
    <a class="navlink" href="#faq">FAQ</a>
  </div>
</header>
</body>
</html>
