<svg width="450" height="120" viewBox="0 0 450 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradValue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A7F3D0" />
      <stop offset="50%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#166534" />
    </linearGradient>

    <linearGradient id="gradBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BAE6FD" />
      <stop offset="50%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#075985" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <text x="50%" y="85" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="70" letter-spacing="-3">
      <tspan fill="url(#gradValue)">VALUE</tspan>
      <tspan fill="url(#gradBot)">BOT</tspan>
    </text>
  </g>
</svg>
