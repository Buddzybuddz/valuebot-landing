<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; }
  .header-grid {
    display: grid;
    grid-template-columns: auto auto auto auto auto auto auto auto;
    column-gap: 16px;
    row-gap: 8px;
    justify-content: center;
    padding: 20px;
  }
  .logo-cell {
    grid-column: 1 / 4;
    background: #ccc;
    /* To align left with "C" and right with "?", we need to account for padding of navlinks */
    /* navlink has padding 8px 10px */
    /* If logo-cell spans columns 1 to 3, it spans from left edge of item 1 to right edge of item 3 */
    /* The left edge of item 1 is the left padding. The letter "C" is 10px inside. */
    /* So logo should have margin-left: 10px; and margin-right: 10px; */
    margin-left: 10px;
    margin-right: 10px;
  }
  .logo {
    width: 100%;
    height: 40px; /* Example height */
    background: #444;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .buttons-cell {
    grid-column: 5 / 9; /* spanning from column 5 to 8 */
    justify-self: end;
    display: flex;
    gap: 10px;
    margin-right: 10px; /* Align right button with "Q" */
  }
  .navlink {
    padding: 8px 10px;
    background: #eee;
    text-align: center;
    white-space: nowrap;
  }
  button {
    padding: 8px 16px;
  }
</style>
</head>
<body>
<div class="header-grid">
  <div class="logo-cell">
    <div class="logo">LOGO</div>
  </div>
  <div class="buttons-cell">
    <button>Recevoir</button>
    <button>Gérer</button>
  </div>

  <div class="navlink">C'est quoi ?</div>
  <div class="navlink">Ça sert à quoi ?</div>
  <div class="navlink">Comment ça marche ?</div>
  <div class="navlink">Pour qui ?</div>
  <div class="navlink">Je reçois quoi ?</div>
  <div class="navlink">Performances</div>
  <div class="navlink">Pour combien ?</div>
  <div class="navlink">FAQ</div>
</div>
</body>
</html>
