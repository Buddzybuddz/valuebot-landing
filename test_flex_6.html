<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #eee;}
  .headerInner {
    max-width: 1040px;
    margin: 0 auto;
    padding: 8px 18px;
    background: white;
  }

  .headerContainer {
    display: flex;
    flex-direction: column;
    align-items: center; /* Center everything */
    width: fit-content;
    margin: 0 auto;
  }

  .topRow {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 8px; /* equivalent to menuRow margin-top: 4px + bottom gap */
  }

  .menuRow {
    display: flex;
    justify-content: center;
  }

  .topnav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding-bottom: 6px;
  }

  /* Here is the trick: we can use JavaScript to set the width of the logo to exactly match the width of the first 3 nav items + their gaps!
     Or we can do it with CSS grid, but grid changes the HTML structure.
     Wait, the user wants the HTML to stay the same if possible, or maybe we can change it?
     HTML is provided in index.html, we can change it but changing topRow and menuRow to grid changes the DOM tree. */

</style>
</head>
<body>
<header>
  <div class="headerInner">
    <div class="headerContainer">
      <div class="topRow">
        <div class="brand">LOGO</div>
        <div class="ctaRowTop">
          <a class="navCta primary">Recevoir</a>
          <a class="navCta">Gérer</a>
        </div>
      </div>
      <div class="menuRow">
        <nav class="topnav">
          <a class="navlink" href="#cestquoi">C’est quoi ?</a>
          <a class="navlink" href="#casert">Ça sert à quoi ?</a>
          <a class="navlink" href="#comment">Comment ça marche ?</a>
          <a class="navlink" href="#pourqui">Pour qui ?</a>
          <a class="navlink" href="#je-recois">Je reçois quoi ?</a>
          <a class="navlink" href="#performances">Performances</a>
          <a class="navlink" href="#prix">Pour combien ?</a>
          <a class="navlink" href="#faq">FAQ</a>
        </nav>
      </div>
    </div>
  </div>
</header>
</body>
</html>
