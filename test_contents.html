<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #eee;}

  .headerInner {
    max-width: 1040px;
    margin: 0 auto;
    padding: 8px 18px;
    background: white;

    display: grid;
    grid-template-columns: max-content max-content max-content max-content max-content max-content max-content max-content;
    column-gap: 16px;
    row-gap: 12px;
    justify-content: center;
  }

  .topRow, .menuRow, .topnav {
    display: contents;
  }

  .brand {
    grid-column: 1 / 4;
    grid-row: 1;
    margin-left: 10px;
    margin-right: 10px;
    display: flex;
    align-items: center;
  }

  .logo {
    display: flex;
    align-items: center;
    width: 100%;
    height: 70px;
  }

  .brandLogo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: left;
  }

  .ctaRowTop {
    grid-column: 4 / 9;
    grid-row: 1;
    justify-self: end;
    margin-right: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .burger { display: none; }

  .navlink {
    grid-row: 2;
    padding: 8px 10px;
    background: #f5f5f5;
    text-align: center;
    border-radius: 999px;
    text-decoration: none;
    color: #666;
    white-space: nowrap;
  }

  .navCta {
    padding: 9px 14px;
    border-radius: 999px;
    border: 1px solid #ccc;
    text-decoration: none;
  }

  /* mobile styles */
  @media (max-width: 980px){
    .headerInner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topRow, .menuRow, .topnav { display: contents; }
    /* Wait, if topRow is contents, brand and burger are flex items of headerInner! That works perfectly! */
    .brand { margin: 0; }
    .ctaRowTop { display: none; }
    .navlink { display: none; }
    .burger { display: inline-flex; }
  }
</style>
</head>
<body>
<header>
  <div class="headerInner">
    <div class="topRow">
      <div class="brand">
        <div class="logo">
          <img class="brandLogo" src="assets/Logo_v2.png" />
        </div>
      </div>
      <div class="ctaRowTop">
        <a class="navCta primary">Recevoir</a>
        <a class="navCta">Gérer mon abonnement</a>
      </div>
      <button class="burger">Burger</button>
    </div>

    <div class="menuRow">
      <nav class="topnav">
        <a class="navlink" href="#cestquoi">C’est quoi ?</a>
        <a class="navlink" href="#casert">Ça sert à quoi ?</a>
        <a class="navlink" href="#comment">Comment ça marche ?</a>
        <a class="navlink" href="#pourqui">Pour qui ?</a>
        <a class="navlink" href="#je-recois">Je reçois quoi ?</a>
        <a class="navlink" href="#performances">Performances</a>
        <a class="navlink" href="#prix">Pour combien ?</a>
        <a class="navlink" href="#faq">FAQ</a>
      </nav>
    </div>
  </div>
</header>
</body>
</html>
