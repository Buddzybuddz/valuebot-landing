<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #eee;}
  .headerInner {
    /* original layout is column oriented */
    display: flex;
    flex-direction: column;
    max-width: 1040px;
    margin: 0 auto;
    padding: 8px 18px;
    background: white;
  }

  .topRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .menuRow {
    margin-top: 4px;
    display: flex;
    justify-content: center;
  }

  .topnav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    padding-bottom: 6px;
    position: relative; /* to allow absolute positioning of topRow relative to menu items if needed, but not easy */
  }

  /* wait, if we keep them separate flex containers, we can't align them dynamically when the screen size changes or font size changes! */

</style>
</head>
<body>
</body>
</html>
